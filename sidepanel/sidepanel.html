<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SubHunter - Side Panel</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sidepanel">
    <header class="panel-header">
      <div class="header-brand">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          <path d="M2 12h20"/>
        </svg>
        <h1>SubHunter</h1>
      </div>
      <button id="settingsBtn" class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <section class="scan-section">
      <div class="input-row">
        <input type="text" id="domainInput" placeholder="Enter domain (e.g., example.com)" autocomplete="off" spellcheck="false">
        <button id="scanBtn" class="btn-primary">
          <span class="btn-text">Scan</span>
          <svg class="spinner-icon hidden" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4"/>
          </svg>
        </button>
      </div>
      
      <div id="progressSection" class="progress-section hidden">
        <div class="progress-bar-container">
          <div id="progressBar" class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div class="progress-stats">
            <span id="progressPercent">0%</span>
            <span id="elapsedTime">0s</span>
          </div>
        </div>
        <div id="phaseText" class="phase-text"></div>
      </div>

      <div class="options-row">
        <label class="checkbox-label">
          <input type="checkbox" id="enableCT" checked>
          <span>Certificate Transparency</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="enableBruteforce">
          <span>Brute-force</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="checkLive" checked>
          <span>Check Live</span>
        </label>
      </div>
    </section>

    <section class="stats-section" id="statsSection">
      <div class="stat-card">
        <div class="stat-icon total">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="totalCount">0</span>
          <span class="stat-label">Total Found</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon live">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="liveCount">0</span>
          <span class="stat-label">Live</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon dead">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="deadCount">0</span>
          <span class="stat-label">Dead</span>
        </div>
      </div>
    </section>

    <section class="results-section">
      <div class="results-toolbar">
        <div class="toolbar-left">
          <span class="results-title">Results</span>
          <span id="currentDomain" class="current-domain"></span>
        </div>
        <div class="toolbar-right">
          <input type="text" id="searchInput" class="search-input" placeholder="Filter...">
          <div class="filter-group">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="live">Live</button>
            <button class="filter-btn" data-filter="dead">Dead</button>
          </div>
        </div>
      </div>
      
      <div class="results-container">
        <div id="resultsList" class="results-list">
          <div class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
            <p>Enter a domain to start scanning</p>
            <p class="hint">Subdomains will appear here</p>
          </div>
        </div>
      </div>
    </section>

    <footer class="panel-footer">
      <div class="footer-left">
        <select id="exportFormat" class="export-select">
          <option value="txt">TXT</option>
          <option value="json">JSON</option>
          <option value="csv">CSV</option>
        </select>
        <button id="exportBtn" class="btn-secondary" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
      </div>
      <div class="footer-right">
        <button id="clearBtn" class="icon-btn" title="Clear Results" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
        <button id="copyAllBtn" class="icon-btn" title="Copy All" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
