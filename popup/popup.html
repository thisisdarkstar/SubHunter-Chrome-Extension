<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=350">
  <title>SubHunter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="header-left">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          <path d="M2 12h20"/>
        </svg>
        <h1>SubHunter</h1>
      </div>
      <div class="header-actions">
        <button id="settingsBtn" class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button id="sidepanelBtn" class="icon-btn" title="Full View">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="scan-section">
      <div class="input-group">
        <input type="text" id="domainInput" placeholder="example.com" autocomplete="off" spellcheck="false">
        <button id="scanBtn" class="btn-primary">
          <span class="btn-text">Scan</span>
          <span class="btn-loading hidden">
            <svg class="spinner-icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4"/>
            </svg>
          </span>
        </button>
      </div>
      
      <div id="progressContainer" class="progress-container hidden">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div class="progress-info">
          <span id="progressText">0%</span>
          <span id="phaseText"></span>
        </div>
      </div>
    </div>

    <div id="resultsSummary" class="results-summary hidden">
      <div class="summary-stat">
        <span id="totalCount" class="stat-value">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="summary-stat live">
        <span id="liveCount" class="stat-value">0</span>
        <span class="stat-label">Live</span>
      </div>
      <div class="summary-stat dead">
        <span id="deadCount" class="stat-value">0</span>
        <span class="stat-label">Dead</span>
      </div>
    </div>

    <div class="results-section">
      <div class="results-header">
        <span class="results-title">Results</span>
        <div class="results-actions">
          <button id="filterAll" class="filter-btn active" data-filter="all">All</button>
          <button id="filterLive" class="filter-btn" data-filter="live">Live</button>
          <button id="filterDead" class="filter-btn" data-filter="dead">Dead</button>
        </div>
      </div>
      
      <div id="resultsList" class="results-list">
        <div class="empty-state">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <p>Enter a domain and click Scan</p>
        </div>
      </div>
    </div>

    <footer class="popup-footer">
      <div class="footer-left">
        <button id="exportBtn" class="btn-secondary" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
        <select id="exportFormat" class="export-select" disabled>
          <option value="txt">TXT</option>
          <option value="json">JSON</option>
          <option value="csv">CSV</option>
        </select>
      </div>
      <button id="clearBtn" class="icon-btn" title="Clear Results" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </button>
    </footer>
  </div>

  <div id="exportMenu" class="dropdown-menu hidden">
    <button data-format="txt">Export as TXT</button>
    <button data-format="json">Export as JSON</button>
    <button data-format="csv">Export as CSV</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
